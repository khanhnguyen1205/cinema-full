name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Typecheck · Lint · Format · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:run
      - run: npm run build

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cinema_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cinema_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/cinema_test
      JWT_SECRET: ci-e2e-secret-not-a-real-one
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Áp migration lên Postgres của CI
        run: npx prisma migrate deploy --schema server/prisma/schema.prisma
      - name: Nạp dữ liệu seed
        run: npm run prisma:seed
      - name: Cài Chromium cho Playwright
        run: npx playwright install --with-deps chromium
      # webServer trong playwright.config tự bật cả 3 server qua `npm run dev`
      # (CI=true nên reuseExistingServer=false). Trace được lưu khi có retry.
      - run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (không push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: cinema-full:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Máy dev không có Docker nên đây là lần duy nhất Dockerfile được chạy thật
      # trước khi Render build. Không khởi động server (cần DATABASE_URL) — chỉ
      # xác nhận image chứa đủ artefact và Node chạy được bên trong.
      - name: Kiểm image có đủ artefact
        run: |
          docker run --rm --entrypoint node cinema-full:ci -e "
            const fs = require('fs');
            for (const f of ['server/dist/index.js','server/dist/app.js','build/index.html']) {
              if (!fs.existsSync(f)) { console.error('THIEU:', f); process.exit(1); }
            }
            console.log('Image co du SPA build + server da bien dich.');
          "
